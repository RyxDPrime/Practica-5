<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial de Compras</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div class="container mt-4">

    <h2 class="text-center">Historial de Compras</h2>

    <div class="admin-toolbar">
        <a class="btn btn-outline-primary admin-btn admin-btn-nav" href="/admin/dashboard">Dashboard</a>
        <a class="btn btn-outline-primary admin-btn admin-btn-nav" href="/admin/productos">Productos</a>
        <a class="btn btn-outline-primary admin-btn admin-btn-nav" href="/admin/usuarios">Usuarios</a>
        <a class="btn btn-primary admin-btn admin-btn-nav" href="/admin/compras">Historial Compras</a>
        <a class="btn btn-outline-secondary admin-btn admin-btn-nav" href="/">Inicio</a>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(compras)}">
        No hay compras registradas.
    </div>

    <div class="card mb-4" th:each="compra : ${compras}">

        <div class="card-header">
            <strong>Cliente:</strong>
            <span th:text="${compra.cliente}"></span>
            |
            <strong>Fecha:</strong>
            <span th:text="${compra.fecha}"></span>
        </div>

        <div class="card-body">

            <table class="table table-bordered text-center">
                <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="item : ${compra.items}">
                    <td th:text="${item.producto.nombre}"></td>
                    <td th:text="${item.producto.precio}"></td>
                    <td th:text="${item.cantidad}"></td>
                    <td th:text="${item.subtotal}"></td>
                </tr>
                </tbody>
            </table>

            <div class="text-end fw-bold">
                Total Compra: RD$ <span th:text="${compra.total}"></span>
            </div>

        </div>
    </div>

    <div class="admin-toolbar">
        <a class="btn btn-outline-secondary admin-btn" href="/admin/dashboard">
            Volver al Dashboard
        </a>
    </div>

</div>

<script th:inline="javascript">
    const appBasePath = /*[[@{/}]]*/ '/';
    const normalizedBase = appBasePath.endsWith('/') ? appBasePath.slice(0, -1) : appBasePath;

    function conectarPresenciaOnline() {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(proto + '://' + location.host + normalizedBase + '/ws/online');

        ws.onclose = function () {
            setTimeout(conectarPresenciaOnline, 3000);
        };

        ws.onerror = function () {
            ws.close();
        };
    }

    conectarPresenciaOnline();
</script>

</body>
</html>
