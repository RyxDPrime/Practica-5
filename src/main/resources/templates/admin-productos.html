<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div class="container mt-4">

    <h2 class="text-center mb-4">Administrar Productos</h2>

    <div class="admin-toolbar">
        <a class="btn btn-outline-primary admin-btn admin-btn-nav" href="/admin/dashboard">Dashboard</a>
        <a class="btn btn-primary admin-btn admin-btn-nav" href="/admin/productos">Productos</a>
        <a class="btn btn-outline-primary admin-btn admin-btn-nav" href="/admin/usuarios">Usuarios</a>
        <a class="btn btn-outline-primary admin-btn admin-btn-nav" href="/admin/compras">Historial Compras</a>
        <a class="btn btn-outline-secondary admin-btn admin-btn-nav" href="/">Inicio</a>
    </div>

    <div class="card mb-4">
        <div class="card-body">

            <h5 id="formTitulo">Crear Producto</h5>

            <form action="/admin/productos"
                  enctype="multipart/form-data"
                  id="formularioProducto"
                  method="post">

                <input id="metodo" name="_method" type="hidden" value="">

                <div class="mb-3">
                    <label class="form-label" for="nombre">Nombre</label>
                    <input class="form-control"
                           id="nombre"
                           name="nombre"
                           placeholder="Nombre"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="precio">Precio</label>
                    <input class="form-control"
                           id="precio"
                           name="precio"
                           placeholder="Precio"
                           required
                           step="0.01"
                           type="number">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="descripcion">Descripción</label>
                    <textarea class="form-control"
                              id="descripcion"
                              name="descripcion"
                              placeholder="Descripción"
                              required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="imagenes">Imágenes del producto (puedes seleccionar varias)</label>
                    <input accept="image/*"
                           class="form-control"
                           id="imagenes"
                           multiple
                           name="imagenes"
                           required
                           type="file">
                    <small class="text-muted" id="avisoImagenes">* Requerido para crear producto</small>
                </div>

                <div class="admin-actions justify-content-start">
                    <button class="btn btn-primary admin-btn" id="btnGuardar" type="submit">
                        Guardar Producto
                    </button>
                    <button class="btn btn-outline-secondary admin-btn" id="btnCancelar" onclick="cancelarEdicion()" style="display:none;"
                            type="button">
                        Cancelar
                    </button>
                </div>

            </form>

        </div>
    </div>


    <h4>Productos Registrados</h4>

    <table class="table table-bordered text-center align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Imágenes</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${productos}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.nombre}"></td>
            <td>RD$ <span th:text="${p.precio}"></span></td>
            <td>
                <span class="badge" style="color: #000000" th:text="${p.imagenes.size()}"></span>
            </td>

            <td>
                <div class="admin-actions">
                <button class="btn btn-outline-primary btn-sm admin-btn"
                        onclick="cargarEdicion(this.getAttribute('data-producto-id'), this.getAttribute('data-producto-nombre'), this.getAttribute('data-producto-precio'), this.getAttribute('data-producto-descripcion'))"
                        th:data-producto-descripcion="${p.descripcion}"
                        th:data-producto-id="${p.id}"
                        th:data-producto-nombre="${p.nombre}"
                        th:data-producto-precio="${p.precio}">
                    Editar
                </button>

                <button class="btn btn-danger btn-sm mb-1"
                        onclick="eliminarProducto(this.getAttribute('data-producto-id'), this.getAttribute('data-producto-nombre'))"
                        th:data-producto-id="${p.id}"
                        th:data-producto-nombre="${p.nombre}">
                    Eliminar
                </button>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <a class="btn btn-outline-secondary admin-btn mt-3" href="/">
        Volver al Inicio
    </a>

</div>

<script>
    function cargarEdicion(id, nombre, precio, descripcion) {

        document.getElementById('formularioProducto').scrollIntoView({behavior: 'smooth'});

        document.getElementById('nombre').value = nombre;
        document.getElementById('precio').value = precio;
        document.getElementById('descripcion').value = descripcion;
        document.getElementById('metodo').value = 'PUT';

        document.getElementById('formTitulo').textContent = 'Editar Producto: ' + nombre;
        document.getElementById('btnGuardar').textContent = 'Guardar Cambios';
        document.getElementById('btnCancelar').style.display = 'inline-block';
        document.getElementById('avisoImagenes').textContent = '* Opcional: deja vacío para no cambiar imágenes';
        document.getElementById('imagenes').required = false;

        document.getElementById('formularioProducto').action = '/admin/productos/' + id;
    }

    function cancelarEdicion() {
        document.getElementById('formularioProducto').reset();
        document.getElementById('metodo').value = '';

        document.getElementById('formTitulo').textContent = 'Crear Producto';
        document.getElementById('btnGuardar').textContent = 'Guardar Producto';
        document.getElementById('btnCancelar').style.display = 'none';
        document.getElementById('avisoImagenes').textContent = '* Requerido para crear producto';
        document.getElementById('imagenes').required = true;
        document.getElementById('formularioProducto').action = '/admin/productos';
    }

    function eliminarProducto(id, nombre) {
        if (!confirm('¿Estás seguro de eliminar el producto "' + nombre + '"?\n\nEsta acción no se puede deshacer.')) {
            return;
        }

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/admin/productos/' + id;

        const methodInput = document.createElement('input');
        methodInput.type = 'hidden';
        methodInput.name = '_method';
        methodInput.value = 'DELETE';
        form.appendChild(methodInput);

        document.body.appendChild(form);
        form.submit();
    }
</script>

<script th:inline="javascript">
    const appBasePath = /*[[@{/}]]*/ '/';
    const normalizedBase = appBasePath.endsWith('/') ? appBasePath.slice(0, -1) : appBasePath;

    function conectarPresenciaOnline() {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(proto + '://' + location.host + normalizedBase + '/ws/online');

        ws.onclose = function () {
            setTimeout(conectarPresenciaOnline, 3000);
        };

        ws.onerror = function () {
            ws.close();
        };
    }

    conectarPresenciaOnline();
</script>

</body>
</html>
