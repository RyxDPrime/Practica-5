<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div class="container mt-4">

    <h2 class="text-center mb-4">Administrar Usuarios</h2>

    <div class="admin-toolbar">
        <a class="btn btn-outline-primary admin-btn admin-btn-nav" href="/admin/dashboard">Dashboard</a>
        <a class="btn btn-outline-primary admin-btn admin-btn-nav" href="/admin/productos">Productos</a>
        <a class="btn btn-primary admin-btn admin-btn-nav" href="/admin/usuarios">Usuarios</a>
        <a class="btn btn-outline-primary admin-btn admin-btn-nav" href="/admin/compras">Historial Compras</a>
        <a class="btn btn-outline-secondary admin-btn admin-btn-nav" href="/">Inicio</a>
    </div>

    <h4>Usuarios Registrados</h4>

    <table class="table table-bordered text-center align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Rol</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="u : ${usuarios}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>

            <td>
                <span class="badge bg-success" th:if="${u.admin}">Admin</span>
                <span class="badge bg-secondary" th:unless="${u.admin}">Usuario</span>
            </td>

            <td th:with="esAdminProtegido=${#strings.equalsIgnoreCase(u.username, 'admin') or u.id == 1}, esCuentaSesion=${u.id == sesionUsuarioId}">
                <span class="badge bg-secondary fs-6 px-3 py-2"
                    th:if="${esAdminProtegido}">
                    No disponible para administrador
                </span>

                <span th:if="${not esAdminProtegido and esCuentaSesion}"
                      class="badge bg-secondary fs-6 px-3 py-2">
                    Esta es tu cuenta &mdash; no se puede modificar
                </span>



                <!-- Botones para todas las demás cuentas -->
                <span th:if="${not esAdminProtegido and not esCuentaSesion}" class="admin-actions">

                    <!-- Quitar Admin: visible solo si ya es admin -->
                    <button th:if="${u.admin}"
                            class="btn btn-outline-primary btn-sm admin-btn"
                            th:data-usuario-id="${u.id}"
                            th:data-usuario-nombre="${u.username}"
                            onclick="toggleAdmin(this.getAttribute('data-usuario-id'), this.getAttribute('data-usuario-nombre'), true)">
                        Quitar Admin
                    </button>

                    <!-- Hacer Admin: visible solo si NO es admin -->
                    <button th:unless="${u.admin}"
                            class="btn btn-primary btn-sm admin-btn"
                            th:data-usuario-id="${u.id}"
                            th:data-usuario-nombre="${u.username}"
                            onclick="toggleAdmin(this.getAttribute('data-usuario-id'), this.getAttribute('data-usuario-nombre'), false)">
                        Hacer Admin
                    </button>

                    <button class="btn btn-danger btn-sm admin-btn"
                            th:data-usuario-id="${u.id}"
                            th:data-usuario-nombre="${u.username}"
                            onclick="eliminarUsuario(this.getAttribute('data-usuario-id'), this.getAttribute('data-usuario-nombre'))">
                        Eliminar
                    </button>

                </span>
            </td>
        </tr>
        </tbody>
    </table>

    <a class="btn btn-outline-secondary admin-btn mt-3" href="/admin/productos">Volver a Productos</a>

</div>

<script>
    function toggleAdmin(id, nombre, esActualmenteAdmin) {
        const accion = esActualmenteAdmin
            ? 'Quitar rol de administrador a "' + nombre + '"?'
            : 'Convertir a "' + nombre + '" en administrador?';

        if (!confirm('¿' + accion)) return;

        fetch('/admin/usuarios/' + id + '/admin', { method: 'PUT' })
            .then(response => {
                if (response.ok) {
                    location.reload();
                } else if (response.status === 403) {
                    alert('No se puede modificar la cuenta de administrador protegida ni tu propia cuenta.');
                } else {
                    alert('Error al actualizar el rol del usuario');
                }
            })
            .catch(() => alert('Error de conexión'));
    }

    function eliminarUsuario(id, nombre) {
        if (!confirm('¿Eliminar al usuario "' + nombre + '"?\n\nEsta acción no se puede deshacer.')) return;

        fetch('/admin/usuarios/' + id, { method: 'DELETE' })
            .then(response => {
                if (response.ok) {
                    location.reload();
                } else if (response.status === 403) {
                    alert('No se puede eliminar la cuenta de administrador protegida ni tu propia cuenta.');
                } else {
                    alert('Error al eliminar usuario');
                }
            })
            .catch(() => alert('Error de conexión'));
    }
</script>

</body>
</html>
