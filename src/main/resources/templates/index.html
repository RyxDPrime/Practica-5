<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Mi Tienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }

        /* Navbar */
        .navbar { box-shadow: 0 1px 4px rgba(0,0,0,.1); }

        /* Badge de usuarios online */
        #badge-online {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #198754;
            color: #fff;
            font-size: .78rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            transition: background .3s;
        }
        #badge-online.desconectado { background: #6c757d; }
        .pulso {
            width: 8px; height: 8px;
            background: #a3ffca;
            border-radius: 50%;
            animation: pulso 1.4s infinite;
        }
        @keyframes pulso {
            0%, 100% { transform: scale(1);   opacity: 1; }
            50%       { transform: scale(1.5); opacity: .5; }
        }

        /* Tarjetas de producto */
        .producto-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
            transition: transform .2s, box-shadow .2s;
            overflow: hidden;
        }
        .producto-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 18px rgba(0,0,0,.13);
        }
        .producto-card .card-img-top {
            height: 200px;
            object-fit: cover;
        }
        .producto-card .precio {
            font-size: 1.2rem;
            font-weight: 700;
            color: #198754;
        }
        .producto-card .descripcion {
            font-size: .875rem;
            color: #6c757d;
            /* Mostrar máximo 2 líneas */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

<body>

<!-- ── Navbar ── -->
<nav class="navbar navbar-light bg-white px-4 d-flex justify-content-between flex-wrap gap-2 mb-4">

    <a class="navbar-brand fw-bold" href="/">Mi Tienda</a>

    <span class="navbar-brand small fw-semibold "
          th:if="${usuario != null}"
          th:text="'Hola, ' + ${usuario.username}">
        </span>

    <div class="d-flex align-items-center gap-2 flex-wrap">

        <!-- Req. 1: usuarios online -->
        <span id="badge-online" class="desconectado" title="Usuarios navegando ahora">
            <span class="pulso"></span>
            <span id="contador-online">…</span> online
        </span>

        <a class="btn btn-outline-primary btn-sm" href="/carrito">
            Carrito (<span th:text="${cantidadCarrito}">0</span>)
        </a>

        <a class="btn btn-outline-secondary btn-sm"
           href="/login"
           th:if="${usuario == null}">
            Iniciar Sesión
        </a>

        <a class="btn btn-outline-secondary btn-sm"
           href="/logout"
           th:if="${usuario != null}">
            Cerrar Sesión
        </a>

        <a class="btn btn-dark btn-sm"
           href="/admin/productos"
           th:if="${usuario != null and usuario.admin}">
            Panel Admin
        </a>

    </div>
</nav>

<!-- ── Contenido ── -->
<div class="container pb-5">

    <h4 class="mb-4 text-center text-muted fw-normal">Explora nuestros productos</h4>

    <!-- Sin productos -->
    <div class="alert alert-info text-center" th:if="${productos.isEmpty()}">
        No hay productos disponibles en este momento.
    </div>

    <!-- Grid de productos -->
    <div class="row g-4">
        <div class="col-sm-6 col-md-4 col-lg-3"
             th:each="p : ${productos}">

            <div class="card producto-card h-100">

                <!-- Imagen -->
                <img alt="Imagen del producto"
                     class="card-img-top"
                     th:if="${p.imagenes != null and !p.imagenes.isEmpty()}"
                     th:src="'data:image/png;base64,' + ${p.imagenes.iterator().next().base64}">

                <!-- Sin imagen: placeholder -->
                <div class="d-flex align-items-center justify-content-center bg-light"
                     style="height:200px;"
                     th:if="${p.imagenes == null or p.imagenes.isEmpty()}">
                    <span class="text-muted fs-1">📦</span>
                </div>

                <div class="card-body d-flex flex-column gap-2">

                    <h6 class="card-title mb-0 fw-bold" th:text="${p.nombre}">Nombre</h6>

                    <p class="descripcion mb-0" th:text="${p.descripcion}">Descripción</p>

                    <p class="precio mb-0">
                        RD$ <span th:text="${p.precio}">0.00</span>
                    </p>

                    <a class="btn btn-outline-secondary btn-sm mt-auto"
                       th:href="@{'/producto/' + ${p.id}}">
                        Ver detalle
                    </a>

                    <form action="/carrito/items"
                          method="post"
                          th:if="${usuario != null and !usuario.admin}">
                        <input name="id" th:value="${p.id}" type="hidden">
                        <div class="input-group input-group-sm">
                            <input class="form-control text-center"
                                   min="1" name="cantidad" type="number" value="1">
                            <button class="btn btn-success" type="submit">
                                + Agregar
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <!-- Paginación -->
    <nav class="mt-5 d-flex justify-content-center gap-2" th:if="${totalPaginas > 1}">
        <a class="btn btn-outline-secondary"
           th:href="@{'/?page=' + ${pagina - 1}}"
           th:if="${pagina > 1}">
            ← Anterior
        </a>
        <span class="btn btn-light disabled"
              th:text="'Página ' + ${pagina} + ' de ' + ${totalPaginas}">
        </span>
        <a class="btn btn-outline-secondary"
           th:href="@{'/?page=' + ${pagina + 1}}"
           th:if="${pagina < totalPaginas}">
            Siguiente →
        </a>
    </nav>

</div>

<!-- Req. 1: WebSocket usuarios online -->
<script>
    (function () {
        const badge   = document.getElementById('badge-online');
        const contador = document.getElementById('contador-online');
        const proto   = location.protocol === 'https:' ? 'wss' : 'ws';
        const wsUrl   = proto + '://' + location.host + '/ws/online';
        let ws;

        function conectar() {
            ws = new WebSocket(wsUrl);
            ws.onopen    = () => badge.classList.remove('desconectado');
            ws.onmessage = e => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.online !== undefined) contador.textContent = data.online;
                } catch (_) {}
            };
            ws.onclose = () => {
                badge.classList.add('desconectado');
                contador.textContent = '?';
                setTimeout(conectar, 3000);
            };
            ws.onerror = () => ws.close();
        }

        conectar();
        window.addEventListener('beforeunload', () => ws && ws.close());
    })();
</script>

</body>
</html>
