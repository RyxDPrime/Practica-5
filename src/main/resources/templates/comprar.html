<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial de Compras</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="container mt-4">

<h2 class="mb-4">Historial de Compras</h2>

<div th:if="${#lists.isEmpty(compras)}">
    <div class="alert alert-info">
        No hay compras registradas.
    </div>
</div>

<div class="card mb-3" th:each="c : ${compras}">

    <div class="card-header">
        Cliente:
        <strong th:text="${c.cliente}"></strong>
    </div>

    <div class="card-body">

        <ul class="list-group mb-3">
            <li class="list-group-item"
                th:each="item : ${c.items}">

                <span th:text="${item.producto.nombre}"></span>
                -
                Cantidad:
                <span th:text="${item.cantidad}"></span>
                -
                Subtotal:
                RD$
                <span th:text="${item.subtotal}"></span>

            </li>
        </ul>

        <div class="text-end fw-bold">
            Total: RD$
            <span th:text="${c.total}"></span>
        </div>

    </div>
</div>

<a class="btn btn-secondary" href="/admin/productos">
    Volver al Panel
</a>

</body>
</html>
