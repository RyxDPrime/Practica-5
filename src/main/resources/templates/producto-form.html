<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear / Editar Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div class="container mt-4">

    <h2 class="text-center">Crear / Editar Producto</h2>

    <div class="form-card">

        <form method="post" th:action="${accion}">

            <input name="id" th:value="${producto.id}" type="hidden">

            <div class="mb-3">
                <label>Nombre</label>
                <input class="form-control"
                       name="nombre"
                       required
                       th:value="${producto.nombre}"
                       type="text">
            </div>

            <div class="mb-3">
                <label>Precio</label>
                <input class="form-control"
                       name="precio"
                       required
                       step="0.01"
                       th:value="${producto.precio}"
                       type="number">
            </div>

            <div class="text-center">
                <button class="btn btn-primary">
                    Guardar
                </button>

                <a class="btn btn-secondary"
                   href="/admin/productos">
                    Cancelar
                </a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
