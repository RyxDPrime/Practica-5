services:

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: practica3-app

    ports:
      - "7000:7000"
      - "8082:8082"

    environment:

      JDBC_DATABASE_URL: ${JDBC_DATABASE_URL:-}

    volumes:
      - h2-data:/root

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  h2-data: